# KrishiSahyog - Production Docker Compose
# Run: docker-compose up -d
# Frontend: http://localhost
# Backend API: http://localhost:8000 (direct) or via /api proxy through frontend

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishisahyog-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/krishisahyog.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:80
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - backend_data:/app/data
      - ./backend/models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: krishisahyog-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

volumes:
  backend_data:
